<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta CNPJ - Receita WS</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <div class="container">
        <h1>Consulta CNPJ</h1>
        <p class="subtitle">Insira apenas os números do CNPJ</p>
        
        <div class="search-box">
            <input type="text" id="cnpj" placeholder="Ex: 06990590000123" maxlength="14">
            <button onclick="buscarCNPJ()">Consultar Empresa</button>
        </div>

        <div id="resultado">
            <!-- Os dados aparecerão aqui via JavaScript -->
        </div>
    </div>

    <!-- Importação do arquivo JavaScript -->
    <script src="script.js"></script>
</body>
</html>
